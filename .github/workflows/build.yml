name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
          - target: linux-aarch64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.target }}-${{ hashFiles('**/*.cpp', '**/*.hpp', 'CMakeLists.txt') }}
          restore-keys: ccache-${{ matrix.target }}-

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel

      - name: Discover binary name
        id: meta
        run: |
          project=$(cmake -L -N build 2>/dev/null \
            | awk -F= '/^CMAKE_PROJECT_NAME:/ { print $2; exit }')
          if [ -z "$project" ]; then
            project=$(find build -maxdepth 1 -type f -executable \
              | head -1 | xargs -r basename)
          fi
          echo "project=$project" >> "$GITHUB_OUTPUT"
          echo "artifact=${project}-${{ matrix.target }}" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: ./build/${{ steps.meta.outputs.project }} --help

      - name: Strip & stage artifact
        run: |
          strip build/${{ steps.meta.outputs.project }}
          cp build/${{ steps.meta.outputs.project }} \
             ${{ steps.meta.outputs.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact }}
          path: ${{ steps.meta.outputs.artifact }}
          retention-days: 7

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  aur-publish:
    name: AUR
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set pkgver from tag
        run: |
          pkgver="${GITHUB_REF_NAME#v}"
          sed -i "s/^pkgver=.*/pkgver=$pkgver/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: sec-audit
          pkgbuild: ./PKGBUILD
          commit_username: ${{ github.repository_owner }}
          commit_email: ${{ secrets.AUR_COMMIT_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update to ${{ github.ref_name }}
          updpkgsums: true
